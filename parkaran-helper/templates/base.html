<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShabadVerse{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: { DEFAULT: '#0f0d13' },
                        deep: { DEFAULT: '#161420' },
                        mid: { DEFAULT: '#1e1a2a' },
                        star: { 50: '#fefce8', 100: '#fef9c3', 200: '#fef08a', 300: '#fde047', 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309', 800: '#92400e', 900: '#78350f' },
                        nebula: { blue: '#3b82f6', purple: '#8b5cf6', cyan: '#06b6d4' },
                        signal: { green: '#10b981', red: '#ef4444' },
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Gurmukhi:wght@400;500;600&family=Noto+Serif+Gurmukhi:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-void text-gray-200 min-h-screen {% block body_class %}{% endblock %}">
<script>
    // Set theme before any rendering to prevent flash of wrong colors.
    // Must run before graph-explorer.js initializes Cytoscape styles.
    (function() {
        var t = localStorage.getItem("shabadverse_theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
    })();
</script>
    <!-- Star field background -->
    <div class="star-field"></div>

    <!-- Top bar (minimal — logo is in sidebar on app page) -->
    <div class="nav-bar sticky top-0 z-50" style="height:4px;"></div>

    <!-- Main Content -->
    <main class="max-w-[1600px] mx-auto px-4 py-4 relative z-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="max-w-[1600px] mx-auto px-4 py-3 text-center">
            <span>
                Gurbani sourced from
                <a href="https://banidb.com" target="_blank" rel="noopener">BaniDB</a>,
                an initiative of the
                <a href="https://sikhitothemax.org" target="_blank" rel="noopener">SikhiToTheMax</a>
                project.
            </span>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
