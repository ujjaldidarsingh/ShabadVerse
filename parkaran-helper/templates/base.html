<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShabadVerse{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: { DEFAULT: '#0f0d13' },
                        deep: { DEFAULT: '#161420' },
                        mid: { DEFAULT: '#1e1a2a' },
                        star: { 50: '#fefce8', 100: '#fef9c3', 200: '#fef08a', 300: '#fde047', 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309', 800: '#92400e', 900: '#78350f' },
                        nebula: { blue: '#3b82f6', purple: '#8b5cf6', cyan: '#06b6d4' },
                        signal: { green: '#10b981', red: '#ef4444' },
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Gurmukhi:wght@400;500;600&family=Noto+Serif+Gurmukhi:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-void text-gray-200 min-h-screen">
    <!-- Star field background -->
    <div class="star-field"></div>

    <!-- Navigation -->
    <nav class="nav-bar sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-4">
            <div class="flex items-center justify-between h-12">
                <a href="/" class="flex items-center gap-2 group">
                    <div class="w-6 h-6 rounded-full bg-star-500 shadow-[0_0_12px_rgba(245,158,11,0.4)] flex items-center justify-center">
                        <div class="w-2 h-2 rounded-full bg-star-200"></div>
                    </div>
                    <span class="font-['Space_Mono'] text-star-400 text-sm tracking-wider group-hover:text-star-300 transition-colors">SHABADVERSE</span>
                </a>
                <div class="flex gap-0.5 items-center">
                    <a href="/explore" class="nav-link {% if request.path in ['/', '/explore'] %}active{% endif %}">EXPLORE</a>
                    <a href="/reviewer" class="nav-link {% if request.path == '/reviewer' %}active{% endif %}">REVIEWER</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-[1600px] mx-auto px-4 py-4 relative z-10">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
